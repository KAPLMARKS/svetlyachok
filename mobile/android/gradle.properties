org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Подавляет early-fail проверки AGP на non-ASCII в пути проекта. Это первая
# линия обороны — её достаточно, если все тулы в цепочке корректно работают
# с UTF-16 путями. ВНИМАНИЕ: для Flutter на Windows этого МАЛО — Dart
# `gen_snapshot.exe` всё равно ломается на mojibake при чтении абсолютных
# путей в `.dart_tool/flutter_build/<hash>/app.dill`, и NTFS-junction тоже
# не спасает (Dart канонизирует junction обратно). Для production-сборок
# держите репозиторий по чисто-ASCII пути (например `C:\dev\svetlyachok\`).
android.overridePathCheck=true
