# Lint-конфигурация для АИС Светлячок (mobile).
# Базовый набор `package:lints/recommended` + строгие правила проекта.

include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Никаких print/debugPrint — используется пакет logger.
    avoid_print: error
    missing_required_param: error
    missing_return: error
    # invalid_annotation_target — известная проблема пары freezed/json_serializable.
    invalid_annotation_target: ignore

  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "**/generated_plugin_registrant.dart"
    - "build/**"

linter:
  rules:
    # Читаемость и стиль
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    use_super_parameters: true
    unnecessary_lambdas: true
    unnecessary_late: true

    # Null-safety
    avoid_dynamic_calls: true
    avoid_type_to_string: true

    # Асинхронщина
    avoid_slow_async_io: true
    cancel_subscriptions: true
    close_sinks: true
    unawaited_futures: true

    # Прочие стилевые правила
    always_declare_return_types: true
    avoid_unused_constructor_parameters: true
    prefer_single_quotes: true
    require_trailing_commas: true
