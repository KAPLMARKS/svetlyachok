; Alembic configuration file.
; sqlalchemy.url is intentionally NOT set here.
; The DSN is read from pydantic-settings (DATABASE_URL) inside alembic/env.py
; so that migrations always run with the same env vars as the application.

[alembic]
script_location = alembic
prepend_sys_path = .

; Revision filenames: timestamp + slug + revision id, sorted lexicographically.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

; UTC timestamps in revision filenames (timezone-independent).
timezone = UTC


; ----------------------------------------------------------------------------
; Logging
; Real structured logging is configured in app/core/logging.py.
; The block below is the minimal stdlib logging config for the alembic CLI.
; ----------------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
